name: Unit Tests

on:
  pull_request:

permissions:
  contents: read

jobs:
  unit-tests:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-26
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts
      - name: Run unit tests
        run: bun run test
